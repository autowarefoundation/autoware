name: docker-build-new-reusable

on:
  workflow_call:
    inputs:
      bake-group:
        description: HCL group to build (e.g. ci-base, ci-core)
        type: string
        required: true
      runner-amd64:
        description: Runner for amd64 builds
        type: string
        default: ubuntu-24.04
      runner-arm64:
        description: Runner for arm64 builds
        type: string
        default: ubuntu-24.04-arm
      ros-distro:
        description: ROS distribution
        type: string
        default: jazzy
      cache-key-prefix:
        description: Extra prefix for cache key separation
        type: string
        default: ""
      target-image:
        description: Registry image name
        type: string
        default: autoware
      needs-source:
        description: Whether to clone source repos via vcs import
        type: boolean
        default: false
      free-disk-space:
        description: Whether to free disk space before building
        type: boolean
        default: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            arch-platform: linux/amd64
          - platform: arm64
            arch-platform: linux/arm64
    runs-on: ${{ matrix.platform == 'amd64' && inputs.runner-amd64 || inputs.runner-arm64 }}
    outputs:
      target-tags: ${{ steps.compute-tags.outputs.tags }}
    steps:
      - name: 💻 Runner specs
        run: |
          echo "::group::CPU"
          lscpu | grep -E "^(Architecture|CPU\(s\)|Model name|Thread|Core|Socket)"
          echo "::endgroup::"
          echo "::group::Memory"
          free -h
          echo "::endgroup::"
          echo "::group::Disk"
          df -h /
          echo "::endgroup::"

      - name: 🔧 Change permission of workspace
        run: sudo chown -R $USER:$USER ${{ github.workspace }}

      - name: 📥 Check out repository
        uses: actions/checkout@v6

      - name: 🏷️ Compute manifest tags from HCL
        id: compute-tags
        run: |
          targets=$(docker buildx bake -f docker-new/docker-bake.hcl --print ${{ inputs.bake-group }} 2>/dev/null \
            | jq -r '.group."${{ inputs.bake-group }}".targets[]')
          tags=""
          for t in $targets; do
            tags="${tags:+$tags }${t}-${{ inputs.ros-distro }}"
          done
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "::notice::Manifest tags: ${tags}"

      - name: 🧹 Free disk space
        if: inputs.free-disk-space && runner.environment == 'github-hosted'
        uses: ./.github/actions/free-disk-space

      - name: 📦 Import source repos
        if: inputs.needs-source
        run: |
          pipx install vcs2l
          mkdir -p src
          vcs import --shallow src < repositories/autoware.repos

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 📋 Prepare build metadata
        id: meta
        run: |
          ref_name="${GITHUB_REF_NAME//\//-}"
          echo "ref_name=${ref_name}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref_name }}" != "main" ]]; then
            echo "ref=${ref_name}" >> "$GITHUB_OUTPUT"
          fi

          echo "::group::Build info"
          echo "  Group:    ${{ inputs.bake-group }}"
          echo "  Distro:   ${{ inputs.ros-distro }}"
          echo "  Platform: ${{ matrix.platform }}"
          echo "  Ref:      ${GITHUB_REF_NAME}"
          echo "  Event:    ${{ github.event_name }}"
          echo "::endgroup::"

      - name: 🔨 Build and push [${{ inputs.bake-group }}] (${{ matrix.platform }})
        uses: docker/bake-action@v7
        env:
          ROS_DISTRO: ${{ inputs.ros-distro }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}/${{ inputs.target-image }}
          PLATFORM: ${{ matrix.platform }}
          TAG_DATE: ${{ steps.meta.outputs.date }}
          TAG_VERSION: ${{ steps.meta.outputs.version }}
          TAG_REF: ${{ steps.meta.outputs.ref }}
          USE_REGISTRY_CONTEXTS: ${{ inputs.bake-group != 'ci-base' }}
        with:
          source: .
          push: true
          targets: ${{ inputs.bake-group }}
          files: docker-new/docker-bake.hcl
          provenance: false
          set: |
            *.platform=${{ matrix.arch-platform }}
            *.args.ROS_DISTRO=${{ inputs.ros-distro }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache-new:${{ inputs.cache-key-prefix }}${{ matrix.platform }}-${{ steps.meta.outputs.ref_name }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache-new:${{ matrix.platform }}-${{ steps.meta.outputs.ref_name }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache-new:${{ inputs.cache-key-prefix }}${{ matrix.platform }}-main
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache-new:${{ matrix.platform }}-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache-new:${{ inputs.cache-key-prefix }}${{ matrix.platform }}-${{ steps.meta.outputs.ref_name }},mode=max,ignore-error=true

      - name: 📊 Build summary
        if: always()
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.target-image }}
        run: |
          {
            echo "### 🐳 Docker Build: \`${{ inputs.bake-group }}\` (${{ matrix.platform }})"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| **ROS Distro** | \`${{ inputs.ros-distro }}\` |"
            echo "| **Platform** | \`${{ matrix.arch-platform }}\` |"
            echo "| **Registry** | \`${IMAGE}\` |"
            echo "| **Tags** | \`${{ steps.compute-tags.outputs.tags }}\` |"
            echo ""
            echo "#### 💾 Disk space"
            echo "\`\`\`"
            df -h / | head -2
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  manifest:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 🔗 Create multi-arch manifests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.target-image }}
          REF_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' && format('-{0}', github.ref_name) || '' }}
        run: |
          ref_suffix="${REF_SUFFIX//\//-}"
          for tag in ${{ needs.build.outputs.target-tags }}; do
            manifest_tag="${tag}${ref_suffix}"
            echo "::group::📦 ${manifest_tag}"
            docker manifest create "${IMAGE}:${manifest_tag}" \
              "${IMAGE}:${manifest_tag}-amd64" \
              "${IMAGE}:${manifest_tag}-arm64"
            docker manifest push "${IMAGE}:${manifest_tag}"
            echo "::endgroup::"
          done

      - name: 📊 Manifest summary
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.target-image }}
          REF_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' && format('-{0}', github.ref_name) || '' }}
        run: |
          ref_suffix="${REF_SUFFIX//\//-}"
          {
            echo "### 🔗 Multi-arch Manifests"
            echo ""
            echo "| Image | Platforms |"
            echo "|-------|-----------|"
            for tag in ${{ needs.build.outputs.target-tags }}; do
              manifest_tag="${tag}${ref_suffix}"
              echo "| \`${IMAGE}:${manifest_tag}\` | amd64, arm64 |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
