services:
  autoware:
    image: ghcr.io/autowarefoundation/autoware:universe-devel-cuda-jazzy
    privileged: true
    runtime: nvidia
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/autoware_data/maps:/home/aw/autoware_data/maps
      - ${HOME}/autoware_data/ml_models:/home/aw/autoware_data/ml_models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: bash
