#     color: "#FF6B35"                 # override default colour
#
# ── Add stereotypes to built-in types ────────────────────────────────────────
# stereotypeExtensions:
#   - elementTypeId: sysml:Component
#     stereotypes: [microservice, lambda, container]

version: "1.0"
name: custom

elementTypes: []
relationshipTypes: []
stereotypeExtensions: []
