cuda_install_drivers: true
# CUDA 13.0 on Ubuntu 24.04 (jazzy / NVIDIA Thor SBSA — Jetson Thor on
#   JetPack 7 and DRIVE Thor on DRIVE OS share the same Blackwell sm_110 silicon).
# CUDA 12.8 on Ubuntu 22.04 (humble / Jetson Orin via JetPack 6).
cuda_version: "{{ '13.0' if ansible_distribution_version == '24.04' else '12.8' }}"
