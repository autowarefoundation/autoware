- name: Install pipx
  become: true
  ansible.builtin.apt:
    name: pipx
    state: latest
    allow_downgrade: "{{ use_locked_versions | default(false) | bool }}"
    update_cache: true

- name: Assert lockfile is loaded in locked mode
  ansible.builtin.assert:
    that: locked_packages is defined
    fail_msg: >-
      use_locked_versions=true but locked_packages is undefined. Run the version_lock
      role first (it is tagged 'always' in the install_dev_env playbook).
    quiet: true
  when: use_locked_versions | default(false) | bool

- name: Install gdown to download files from CMakeLists.txt
  community.general.pipx:
    name: "{{ 'gdown==' ~ locked_packages.pip_pins.gdown if use_locked_versions | default(false) | bool else 'gdown' }}"
    executable: /usr/bin/pipx
    # pipx is a no-op on an existing venv without --force, so a locked run would
    # leave a previously installed gdown on the wrong version. Force in locked mode.
    force: "{{ use_locked_versions | default(false) | bool }}"
