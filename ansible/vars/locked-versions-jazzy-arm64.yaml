# Dependency Version Lockfile
# ROS Distro: jazzy
# Platform: arm64
#
# Template: ros_snapshot_date and apt_pins versions are filled by the arm64 fork-CI run.
# Run `ROS_DISTRO=jazzy ROS_SNAPSHOT_DATE=<YYYY-MM-DD> ./ansible/scripts/generate_ansible_lockfile.sh`.
ros_snapshot_date: ""
apt_pins:
  ccache:
  gdown:
  geographiclib-tools:
  git-lfs:
  golang:
  pipx:
  python3-flake8-blind-except:
  python3-flake8-builtins:
  python3-flake8-class-newline:
  python3-flake8-comprehensions:
  python3-flake8-deprecated:
  python3-flake8-docstrings:
  python3-flake8-import-order:
  python3-flake8-quotes:
  python3-pip:
  python3-pytest-cov:
  python3-pytest-repeat:
  python3-pytest-rerunfailures:
  wget:
ros_overrides: {}
